name: Build & Release APK

on:
  push:
    branches: [ master ]
    paths:
      - 'gradle.properties'

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if AppVersionName changed
        id: check
        run: |
          PREV=$(git show HEAD~1:gradle.properties 2>/dev/null | grep '^AppVersionName=' | cut -d'=' -f2 || echo "")
          CURR=$(grep '^AppVersionName=' gradle.properties | cut -d'=' -f2)
          echo "Previous: $PREV, Current: $CURR"
          if [ "$PREV" != "$CURR" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.version_changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Read version from gradle.properties
        id: version
        run: |
          VERSION_NAME=$(grep '^AppVersionName=' gradle.properties | cut -d'=' -f2)
          VERSION_CODE=$(grep '^AppVersionCode=' gradle.properties | cut -d'=' -f2)
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > ${{ github.workspace }}/release.keystore

      - name: Build Release APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/WakeUpScreen-v${{ steps.version.outputs.name }}.apk

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.name }}"
          NOTES_EN=$(sed -n "/^## \[$VERSION\]/,/^## \[/{/^## \[/d;p;}" docs/CHANGELOG.md)
          NOTES_ZH=$(sed -n "/^## \[$VERSION\]/,/^## \[/{/^## \[/d;p;}" docs/CHANGELOG-zh.md)
          echo "notes_en<<EOF_EN" >> "$GITHUB_OUTPUT"
          echo "$NOTES_EN" >> "$GITHUB_OUTPUT"
          echo "EOF_EN" >> "$GITHUB_OUTPUT"
          echo "notes_zh<<EOF_ZH" >> "$GITHUB_OUTPUT"
          echo "$NOTES_ZH" >> "$GITHUB_OUTPUT"
          echo "EOF_ZH" >> "$GITHUB_OUTPUT"

      - name: Create Tag and Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}
          name: Release v${{ steps.version.outputs.name }}
          body: |
            **WakeUpScreen v${{ steps.version.outputs.name }}** (versionCode: ${{ steps.version.outputs.code }})

            ${{ steps.changelog.outputs.notes_en }}

            ---

            ## 中文更新日志

            ${{ steps.changelog.outputs.notes_zh }}
          files: app/build/outputs/apk/release/WakeUpScreen-v${{ steps.version.outputs.name }}.apk
          make_latest: true
